<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-labelledby="title desc">
  <title id="title">Charles Deng Avatar Placeholder</title>
  <desc id="desc">Gradient placeholder avatar with initials CD.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e2a54" />
      <stop offset="100%" stop-color="#1c6a90" />
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="25%" r="60%">
      <stop offset="0%" stop-color="#67ecff" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#67ecff" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="800" height="800" fill="url(#bg)" />
  <circle cx="250" cy="200" r="240" fill="url(#glow)" />
  <text x="50%" y="54%" text-anchor="middle" fill="#e6f7ff" font-family="Space Grotesk, Plus Jakarta Sans, sans-serif" font-size="240" font-weight="700">CD</text>
</svg>
